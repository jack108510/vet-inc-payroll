<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet INC — Team Portal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f6ff;--surface:#ffffff;--surface2:#eff6ff;--border:#dbeafe;
  --primary:#2563eb;--primary-light:#60a5fa;--text:#1e3a5f;--muted:#64748b;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 12px rgba(37,99,235,.07);position:sticky;top:0;z-index:50}
.logo{font-size:22px;font-weight:700;letter-spacing:-.5px}.logo span{color:var(--primary)}
.staff-info{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted)}
.staff-info .badge{background:var(--surface2);color:var(--primary);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.tabs{display:flex;gap:6px;padding:16px 28px 0;max-width:900px;margin:0 auto}
.tab{padding:10px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);border:1px solid var(--border);transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.main{max-width:900px;margin:0 auto;padding:20px 28px 40px}
.card{background:var(--surface);border-radius:12px;box-shadow:0 1px 12px rgba(37,99,235,.07);padding:24px;margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.status{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600}
.status.draft{background:#fef3c7;color:#92400e}
.status.submitted{background:#dbeafe;color:#1e40af}
.status.approved{background:#d1fae5;color:#065f46}
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.week-nav button{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text)}
.week-nav button:hover{background:var(--surface2)}
.week-nav span{font-size:14px;font-weight:600}
table.timesheet{width:100%;border-collapse:collapse}
.timesheet th{text-align:left;padding:8px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border)}
.timesheet td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:14px}
.timesheet tr:last-child td{border-bottom:none}
.timesheet input[type=number]{width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:14px;text-align:center;outline:none}
.timesheet input[type=number]:focus{border-color:var(--primary)}
.timesheet input[type=text]{width:100%;max-width:260px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.timesheet input[type=text]:focus{border-color:var(--primary)}
.total-row{font-weight:700;background:var(--surface2)}
.total-row td{border-bottom:none!important}
.btn{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{background:var(--primary-light);cursor:not-allowed}
.schedule-toggle{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content}
.schedule-toggle button{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted)}
.schedule-toggle button.active{background:var(--primary);color:#fff}
.shift-list{list-style:none}
.shift-list li{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.shift-list li:last-child{border-bottom:none}
.shift-day{font-weight:600;width:80px}
.shift-time{color:var(--muted)}
.shift-off{color:#cbd5e1;font-style:italic}
.grid-table{width:100%;border-collapse:collapse;font-size:13px}
.grid-table th{padding:10px 8px;text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border)}
.grid-table th:first-child{text-align:left}
.grid-table td{padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)}
.grid-table td:first-child{text-align:left;font-weight:600}
.grid-table tr:last-child td{border-bottom:none}
.shift-chip{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;color:#fff}
.role-vet{background:#2563eb}.role-tech{background:#16a34a}.role-reception{background:#9333ea}
.role-assistant{background:#ea580c}.role-manager{background:#ec4899}
.doc-list{list-style:none}
.doc-list li{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.doc-list li:last-child{border-bottom:none}
.doc-left{display:flex;align-items:center;gap:12px}
.doc-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px}
.doc-name{font-weight:600;font-size:14px}
.doc-date{font-size:12px;color:var(--muted)}
.btn-outline{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--primary);font-size:13px;font-weight:600;cursor:pointer}
.btn-outline:hover{background:var(--surface2)}
.hidden{display:none}
@media(max-width:640px){
  .tabs{padding:12px 12px 0;gap:4px;flex-wrap:wrap}
  .main{padding:16px 12px}
  .card{padding:16px}
  .grid-table{font-size:11px}
}
</style>
</head>
<body>

<header>
  <div class="logo">Vet <span>INC</span></div>
  <div class="staff-info">
    <span class="badge">Vet Tech</span>
    <span>Sarah K.</span>
    <div class="avatar">SK</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('timesheet')">My Timesheet</div>
  <div class="tab" onclick="switchTab('schedule')">Schedule</div>
  <div class="tab" onclick="switchTab('documents')">Documents</div>
</div>

<div class="main">

  <!-- TIMESHEET TAB -->
  <div id="tab-timesheet">
    <div class="card">
      <div class="card-title">
        <span>Weekly Timesheet</span>
        <span class="status draft" id="ts-status">Draft</span>
      </div>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">← Prev</button>
        <span id="week-label"></span>
        <button onclick="changeWeek(1)">Next →</button>
      </div>
      <table class="timesheet">
        <thead><tr><th>Day</th><th>Hours Worked</th><th>Notes</th></tr></thead>
        <tbody id="ts-body"></tbody>
        <tfoot>
          <tr class="total-row"><td colspan="1">Weekly Total</td><td id="ts-total" colspan="2">0 hrs</td></tr>
        </tfoot>
      </table>
      <div style="margin-top:18px;text-align:right">
        <button class="btn btn-primary" id="ts-submit" onclick="submitTimesheet()">Submit for Approval</button>
      </div>
    </div>
  </div>

  <!-- SCHEDULE TAB -->
  <div id="tab-schedule" class="hidden">
    <div class="card">
      <div class="card-title"><span>Schedule</span></div>
      <div class="schedule-toggle">
        <button class="active" onclick="toggleSchedule('my',this)">My Schedule</button>
        <button onclick="toggleSchedule('team',this)">Full Team</button>
      </div>
      <div class="week-nav">
        <button onclick="changeSchedWeek(-1)">← Prev</button>
        <span id="sched-week-label"></span>
        <button onclick="changeSchedWeek(1)">Next →</button>
      </div>
      <div id="my-schedule">
        <ul class="shift-list" id="my-shifts"></ul>
      </div>
      <div id="team-schedule" class="hidden">
        <table class="grid-table">
          <thead><tr><th>Staff</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th></tr></thead>
          <tbody id="team-grid"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- DOCUMENTS TAB -->
  <div id="tab-documents" class="hidden">
    <div class="card">
      <div class="card-title"><span>Documents</span></div>
      <ul class="doc-list" id="doc-list"></ul>
    </div>
  </div>

</div>

<script>
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const today=new Date();
function getWeekStart(d){const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);return new Date(d.getFullYear(),d.getMonth(),diff)}
function fmtRange(start){const end=new Date(start);end.setDate(end.getDate()+6);const s=start.toLocaleDateString('en-US',{month:'short',day:'numeric'});const e=end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});return s+' — '+e}

// Timesheet data
const timesheets=[
  {offset:-2,hours:[8,8,8,8,8,0,0],notes:['','','','','','',''],status:'approved'},
  {offset:-1,hours:[8,7.5,8,8,7,0,0],notes:['','','Training','','','',''],status:'approved'},
  {offset:0,hours:[8,8,8,8,7,0,0],notes:['','','','','','',''],status:'draft'}
];
let currentWeek=0;

function renderTimesheet(){
  const ts=timesheets[currentWeek];
  const ws=getWeekStart(new Date(today));ws.setDate(ws.getDate()+ts.offset*7);
  document.getElementById('week-label').textContent=fmtRange(ws);
  document.getElementById('ts-status').textContent=ts.status.charAt(0).toUpperCase()+ts.status.slice(1);
  document.getElementById('ts-status').className='status '+ts.status;
  const readonly=ts.status!=='draft';
  const tbody=document.getElementById('ts-body');
  tbody.innerHTML='';
  let total=0;
  DAYS.forEach((d,i)=>{
    total+=ts.hours[i];
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${d}</td><td><input type="number" min="0" max="24" step="0.5" value="${ts.hours[i]}" ${readonly?'disabled':''} onchange="updateHours(${i},this.value)"></td><td><input type="text" placeholder="Optional" value="${ts.notes[i]}" ${readonly?'disabled':''} onchange="updateNotes(${i},this.value)"></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('ts-total').textContent=total+' hrs';
  document.getElementById('ts-submit').disabled=readonly;
}

function updateHours(i,v){timesheets[currentWeek].hours[i]=parseFloat(v)||0;renderTimesheet()}
function updateNotes(i,v){timesheets[currentWeek].notes[i]=v}
function changeWeek(dir){currentWeek=Math.max(0,Math.min(timesheets.length-1,currentWeek+dir));renderTimesheet()}
function submitTimesheet(){timesheets[currentWeek].status='submitted';renderTimesheet()}

// Schedule data
const staff=[
  {name:'Dr. Patel',role:'vet',shifts:['8:00–16:00','8:00–16:00','8:00–16:00','8:00–16:00','8:00–14:00','OFF','OFF']},
  {name:'Dr. Chen',role:'vet',shifts:['OFF','8:00–16:00','8:00–16:00','8:00–16:00','8:00–16:00','9:00–13:00','OFF']},
  {name:'Sarah K.',role:'tech',shifts:['8:00–16:00','8:00–16:00','8:00–16:00','8:00–16:00','8:00–15:00','OFF','OFF']},
  {name:'Mike R.',role:'tech',shifts:['9:00–17:00','9:00–17:00','OFF','9:00–17:00','9:00–17:00','9:00–13:00','OFF']},
  {name:'Lisa T.',role:'reception',shifts:['7:30–15:30','7:30–15:30','7:30–15:30','7:30–15:30','7:30–15:30','OFF','OFF']},
  {name:'Emma W.',role:'reception',shifts:['OFF','OFF','12:00–20:00','12:00–20:00','12:00–20:00','8:00–16:00','10:00–14:00']},
  {name:'Jake P.',role:'assistant',shifts:['8:00–14:00','8:00–14:00','8:00–14:00','OFF','8:00–14:00','8:00–12:00','OFF']},
  {name:'Rosa M.',role:'manager',shifts:['8:00–17:00','8:00–17:00','8:00–17:00','8:00–17:00','8:00–17:00','OFF','OFF']}
];
const roleClass={vet:'role-vet',tech:'role-tech',reception:'role-reception',assistant:'role-assistant',manager:'role-manager'};
let schedWeek=0;

function renderSchedule(){
  const ws=getWeekStart(new Date(today));ws.setDate(ws.getDate()+schedWeek*7);
  document.getElementById('sched-week-label').textContent=fmtRange(ws);
  const me=staff.find(s=>s.name==='Sarah K.');
  document.getElementById('my-shifts').innerHTML=me.shifts.map((sh,i)=>`<li><span class="shift-day">${DAYS[i]}</span><span class="${sh==='OFF'?'shift-off':'shift-time'}">${sh}</span></li>`).join('');
  document.getElementById('team-grid').innerHTML=staff.map(s=>`<tr><td><span class="shift-chip ${roleClass[s.role]}">${s.name}</span></td>${s.shifts.map(sh=>`<td style="${sh==='OFF'?'color:#cbd5e1;font-style:italic':''}">${sh}</td>`).join('')}</tr>`).join('');
}
function changeSchedWeek(d){schedWeek+=d;renderSchedule()}
function toggleSchedule(view,btn){
  document.querySelectorAll('.schedule-toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('my-schedule').classList.toggle('hidden',view!=='my');
  document.getElementById('team-schedule').classList.toggle('hidden',view!=='team');
}

// Documents
const docs=[
  {name:'TD1 Personal Tax Credits Return',icon:'📋',date:'Jan 15, 2026',type:'PDF'},
  {name:'TD1AB Alberta Tax Credits Return',icon:'📋',date:'Jan 15, 2026',type:'PDF'},
  {name:'Employee Handbook',icon:'📖',date:'Feb 1, 2026',type:'PDF'},
  {name:'Respectful Workplace Policy',icon:'🤝',date:'Feb 1, 2026',type:'PDF'},
  {name:'Employment Contract',icon:'📝',date:'Dec 1, 2025',type:'PDF'}
];
document.getElementById('doc-list').innerHTML=docs.map(d=>`<li><div class="doc-left"><div class="doc-icon">${d.icon}</div><div><div class="doc-name">${d.name}</div><div class="doc-date">${d.type} · Uploaded ${d.date}</div></div></div><button class="btn-outline" onclick="alert('Document preview — ${d.name}')">View</button></li>`).join('');

// Tab switching
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  ['timesheet','schedule','documents'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab);
  });
}

renderTimesheet();
renderSchedule();
</script>
</body>
</html>
