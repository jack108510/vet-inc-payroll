<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet INC — Payroll Management</title>
<style>
:root{--sidebar:#1e293b;--sidebar-hover:#334155;--primary:#3b82f6;--primary-light:#dbeafe;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--bg:#f1f5f9;--surface:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.1);--shadow-lg:0 10px 30px rgba(0,0,0,.12);--font:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--sidebar-w:240px;--header-h:60px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.5;overflow:hidden;height:100vh}

#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:linear-gradient(135deg,#1e293b 0%,#3b82f6 50%,#1e293b 100%);position:fixed;inset:0;z-index:9999;transition:opacity .4s,visibility .4s}
#loginScreen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:16px;padding:48px 40px;width:380px;box-shadow:var(--shadow-lg);text-align:center}
.login-card h1{font-size:1.6rem;margin-bottom:4px}
.login-card p{color:var(--muted);margin-bottom:28px;font-size:.95rem}
.login-card input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:1rem;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:var(--primary)}
.login-card button{width:100%;margin-top:16px;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.login-card button:hover{background:#2563eb}
.login-card button:active{transform:scale(.98)}
.login-error{color:var(--danger);margin-top:12px;font-size:.85rem;min-height:20px}

#app{display:flex;height:100vh;opacity:0;transition:opacity .4s}
#app.visible{opacity:1}

.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar);color:#fff;display:flex;flex-direction:column;height:100vh;transition:transform .3s;z-index:100}
.sidebar-brand{padding:20px 24px;font-size:1.25rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sidebar-brand span{color:var(--primary)}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;cursor:pointer;transition:background .2s;color:rgba(255,255,255,.65);font-size:.95rem;border-left:3px solid transparent;user-select:none}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:var(--sidebar-hover);color:#fff;border-left-color:var(--primary)}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);font-size:.8rem;color:rgba(255,255,255,.4)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.header-left{display:flex;align-items:center;gap:16px}
.header h2{font-size:1.2rem;font-weight:600}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
.hamburger svg{width:24px;height:24px}
.header-right{display:flex;align-items:center;gap:12px}
.header-user{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.9rem}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem}
.content{flex:1;overflow-y:auto;padding:28px}

.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--surface);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-md)}
.card-header{font-size:1.05rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}

.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--primary);border-radius:0 2px 2px 0}
.stat-card.green::after{background:var(--success)}
.stat-card.yellow::after{background:var(--warning)}
.stat-card.red::after{background:var(--danger)}
.stat-label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:1.8rem;font-weight:700}
.stat-sub{font-size:.8rem;color:var(--muted);margin-top:4px}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.9rem}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-active{background:#dcfce7;color:#166534}
.badge-terminated{background:#fee2e2;color:#991b1b}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-approved{background:#dcfce7;color:#166534}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:500;transition:background .2s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}

select,.input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:var(--font);outline:none;transition:border-color .2s;background:var(--surface)}
select:focus,.input:focus{border-color:var(--primary)}

.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:var(--muted)}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.cal-nav button:hover{background:var(--bg)}
.cal-nav .week-label{font-weight:600;font-size:1rem;min-width:220px;text-align:center}

.cal-grid{display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.cal-day-header{padding:10px 4px;text-align:center;font-size:.75rem;font-weight:600;background:var(--surface);border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.cal-day-header:last-child{border-right:none}
.cal-day-header.weekend{background:#f8fafc}
.cal-day-header.today{color:var(--primary)}
.cal-day-header .day-num{font-size:1.1rem;display:block;font-weight:700}
.cal-day-header .day-name{color:var(--muted)}
.cal-time-label{padding:4px 6px;font-size:.65rem;color:var(--muted);text-align:right;border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:flex-start;justify-content:flex-end}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;min-height:48px;padding:1px}
.cal-cell:last-child{border-right:none}
.cal-cell.weekend{background:#fafbfc}

.shift-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 5px;font-size:.68rem;color:#fff;cursor:pointer;overflow:hidden;transition:transform .15s,box-shadow .15s;z-index:2;white-space:nowrap}
.shift-block:hover{transform:scale(1.03);box-shadow:var(--shadow-md);z-index:5}
.shift-block .s-name{font-weight:600;overflow:hidden;text-overflow:ellipsis}
.shift-block .s-time{opacity:.85;font-size:.6rem}
.sc0{background:#3b82f6}.sc1{background:#8b5cf6}.sc2{background:#ec4899}.sc3{background:#f59e0b}.sc4{background:#10b981}.sc5{background:#6366f1}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:var(--surface);border-radius:12px;padding:28px;width:440px;max-width:90vw;box-shadow:var(--shadow-lg);transform:translateY(10px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{margin-bottom:16px;font-size:1.15rem}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.modal-row:last-child{border-bottom:none}
.modal-label{color:var(--muted);font-size:.85rem}
.modal-value{font-weight:600}

.clock-display{font-size:4rem;font-weight:200;text-align:center;padding:30px;letter-spacing:2px}
.clock-date{text-align:center;color:var(--muted);margin-bottom:24px;font-size:1rem}
.clock-btn{display:block;margin:0 auto 32px;padding:16px 48px;font-size:1.1rem;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:background .2s,transform .1s;color:#fff}
.clock-btn:active{transform:scale(.97)}
.clock-btn.in{background:var(--success)}.clock-btn.in:hover{background:#16a34a}
.clock-btn.out{background:var(--danger)}.clock-btn.out:hover{background:#dc2626}

.feed-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.feed-text{font-size:.85rem}
.feed-time{font-size:.75rem;color:var(--muted)}

.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px}
.bar{flex:1;border-radius:4px 4px 0 0;background:var(--primary);min-height:4px;transition:height .4s;position:relative;cursor:pointer}
.bar:hover{opacity:.8}
.bar-group{text-align:center;flex:1}
.bar-group .bar-label{font-size:.6rem;color:var(--muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}

@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:block}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
}
@media(max-width:600px){
  .grid-4{grid-template-columns:1fr}
  .content{padding:16px}
  .cal-grid{grid-template-columns:40px repeat(7,1fr)}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>🐾 Vet INC</h1>
    <p>Payroll Management Portal</p>
    <input type="password" id="loginPass" placeholder="Enter password" autocomplete="off">
    <button onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">🐾 Vet <span>INC</span></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">© 2026 Vet INC</div>
  </aside>
  <div class="main">
    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <h2 id="pageTitle">Dashboard</h2>
      </div>
      <div class="header-right">
        <div class="header-user"><div class="avatar">SW</div> Scott Wilde</div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<script>
const SB='https://rnqhhzatlxmyvccdvqkr.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucWhoemF0bHhteXZjY2R2cWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTQ5ODUsImV4cCI6MjA5MDU5MDk4NX0.zokle21pVEPG5bIOFiyZIWYkYIwhkolWNOhJ7Cbub30';
const CLINICS={tg:'Tudor Glen',ros:'Rosslyn',rvv:'River Valley',gcc:'GCC',upc:'UPC'};
const RATES={doctor:85,aht:28,rvt:30,receptionist:22,terminated:0};
const DEFRATE=25;
const ICONS={
  dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
  schedule:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  timeclock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
  staff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
  payroll:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
  financials:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>',
  resources:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
};
const PAGES=[
  {id:'dashboard',label:'Dashboard'},{id:'schedule',label:'Schedule'},
  {id:'timeclock',label:'Time Clock'},{id:'staff',label:'Staff Directory'},
  {id:'payroll',label:'Payroll'},{id:'financials',label:'Financials'},
  {id:'resources',label:'Resources'}
];

let curPage='dashboard',staffMap={},tcPosts=[],metaMap={},otReqs=[],deposits=[],pfTotals=[],dataLoaded=false;
let schWeekOff=0,schClinic='',payWeekOff=0,finClinic='',clockInterval=null;

// Login
function doLogin(){
  if(document.getElementById('loginPass').value==='Scotia@9199'){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    init();
  }else document.getElementById('loginError').textContent='Incorrect password';
}
document.getElementById('loginPass').onkeydown=e=>{if(e.key==='Enter')doLogin()};

async function init(){renderNav();renderPage();await loadData()}

function renderNav(){
  const n=document.getElementById('sidebarNav');
  n.innerHTML=PAGES.map(p=>`<div class="nav-item${p.id===curPage?' active':''}" data-p="${p.id}">${ICONS[p.id]}<span>${p.label}</span></div>`).join('');
  n.querySelectorAll('.nav-item').forEach(el=>{el.onclick=()=>{nav(el.dataset.p);document.getElementById('sidebar').classList.remove('open')}});
}

function nav(p){curPage=p;document.getElementById('pageTitle').textContent=PAGES.find(x=>x.id===p)?.label||p;document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.p===p));renderPage()}

function renderPage(){
  const c=document.getElementById('content');
  if(!dataLoaded){c.innerHTML='<div class="spinner"></div><div class="loading">Loading data…</div>';return}
  ({dashboard:rDash,schedule:rSched,timeclock:rClock,staff:rStaff,payroll:rPay,financials:rFin,resources:rRes})[curPage](c);
}

// Fetch helper
async function sbF(t,q=''){
  let rows=[],off=0;
  while(true){
    const r=await fetch(`${SB}/rest/v1/${t}?${q}&offset=${off}&limit=1000`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    const b=await r.json();if(!b.length)break;rows=rows.concat(b);if(b.length<1000)break;off+=1000;
  }
  return rows;
}

async function loadData(){
  try{
    const[u,m,p,ot,dep,tot]=await Promise.all([
      sbF('csi_users'),sbF('csi_usermeta'),
      sbF('csi_posts','post_type=eq.timeclock&select=ID,post_title,post_date&order=post_date.desc&limit=5000'),
      sbF('overtime_requests'),sbF('csi_daily_deposit','order=ddate.desc&limit=500'),
      sbF('csi_pf_totals','order=mdy.desc&limit=500')
    ]);
    u.forEach(x=>{staffMap[x.ID]={id:x.ID,login:x.user_login,name:x.display_name,email:x.user_email}});
    m.forEach(x=>{if(!metaMap[x.user_id])metaMap[x.user_id]={};metaMap[x.user_id][x.meta_key]=x.meta_value});
    Object.keys(staffMap).forEach(id=>{const md=metaMap[id]||{};staffMap[id].clinic=md.clinic||'';staffMap[id].position=md.position||''});
    tcPosts=p.map(parseTc).filter(Boolean);
    otReqs=ot;deposits=dep;pfTotals=tot;dataLoaded=true;renderPage();
  }catch(e){console.error(e);document.getElementById('content').innerHTML='<div class="loading">Error loading data.</div>'}
}

function parseTc(p){
  const parts=p.post_title.split('-');if(parts.length<5)return null;
  const uid=parseInt(parts[0]),ds=parts[1],ts=parseInt(parts[2]);if(isNaN(ts))return null;
  const fn=parts[3],ln=parts.slice(4).join('-');
  return{id:p.ID,uid,date:ds,ts,time:new Date(ts*1000),name:`${fn} ${ln}`,postDate:p.postDate};
}

function getShifts(s,e){
  const m={};tcPosts.forEach(p=>{const k=`${p.uid}-${p.date}`;if(!m[k])m[k]={uid:p.uid,date:p.date,name:p.name,entries:[]};m[k].entries.push(p)});
  const r=[];
  Object.values(m).forEach(s2=>{s2.entries.sort((a,b)=>a.ts-b.ts);for(let i=0;i<s2.entries.length;i+=2){
    const ci=s2.entries[i],co=s2.entries[i+1],ct=co?co.ts:ci.ts,h=Math.max(0,(ct-ci.ts)/3600);
    if(s2.date>=s&&s2.date<=e){const st=staffMap[s2.uid]||{};r.push({...s2,cin:ci.time,cout:co?co.time:null,cinTs:ci.ts,coutTs:ct,hours:h,position:st.position||'',clinic:st.clinic||''})}
  }});return r;
}

function fmtT(d){return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}
function fmtD(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtM(n){return'$'+(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function rate(p){return RATES[p]||DEFRATE}
function monday(d){d=new Date(d);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff))}
function ds(d){return d.toISOString().slice(0,10).replace(/-/g,'')}

// Dashboard
function rDash(c){
  const now=new Date(),today=ds(now);
  const active=Object.values(staffMap).filter(s=>s.position&&s.position!=='terminated');
  const tShifts=getShifts(today,today);
  const mon=monday(now),sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const wShifts=getShifts(ds(mon),ds(sun));
  const wPay=wShifts.reduce((s,x)=>s+x.hours*rate(x.position),0);
  const pOT=otReqs.filter(o=>o.status==='pending').length;
  const recent=tcPosts.slice(0,12);
  c.innerHTML=`
    <div style="margin-bottom:24px"><h3 style="font-size:1.4rem;font-weight:700">Welcome back, Scott 👋</h3><p style="color:var(--muted)">${fmtD(now)} · ${now.toLocaleDateString('en-US',{weekday:'long'})}</p></div>
    <div class="grid-4" style="margin-bottom:28px">
      <div class="stat-card"><div class="stat-label">Active Staff</div><div class="stat-value" data-c="${active.length}">0</div><div class="stat-sub">Across all clinics</div></div>
      <div class="stat-card green"><div class="stat-label">Clocked In Today</div><div class="stat-value" data-c="${tShifts.length}">0</div><div class="stat-sub">Shifts recorded</div></div>
      <div class="stat-card yellow"><div class="stat-label">Weekly Payroll</div><div class="stat-value" data-c="${Math.round(wPay)}" data-pre="$">$0</div><div class="stat-sub">${wShifts.reduce((s,x)=>s+x.hours,0).toFixed(1)} total hrs</div></div>

      <div class="card"><div class="card-header">Recent Activity</div>${recent.map(e=>`<div class="feed-item"><div class="feed-dot" style="background:var(--primary)"></div><div><div class="feed-text">${e.name}</div><div class="feed-time">${e.date}${e.postDate?' · '+fmtT(new Date(e.postDate)):''}</div></div></div>`).join('')}</div>
    </div>`;
  animC();
}

function animC(){document.querySelectorAll('[data-c]').forEach(el=>{const t=+el.dataset.c,pre=el.dataset.pre||'',dur=800,st=performance.now();(function f(n){const p=Math.min((n-st)/dur,1),e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(e*t).toLocaleString();if(p<1)requestAnimationFrame(f)})(st)})}
